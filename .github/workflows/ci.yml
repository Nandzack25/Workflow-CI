name: CI - Retrain and Dockerize

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  MLFLOW_TRACKING_URI: "file:./mlruns"

jobs:
  retrain:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow==2.19.0 scikit-learn pandas numpy

    - name: Run MLflow project
      run: |
        cd MLProject
        mlflow run . --env-manager=local

    - name: Get run_id
      id: get_run_id
      run: |
        cd MLProject
        RUN_ID=$(cat run_id.txt)
        echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
        echo "Run ID: $RUN_ID"

    - name: Upload model artifacts to GitHub
      uses: actions/upload-artifact@v4
      with:
        name: model-artifacts
        path: MLProject/mlruns/
        retention-days: 30

    - name: Build Docker image using mlflow models build-docker
      run: |
        cd MLProject
        mlflow models build-docker -m "runs:/${{ env.RUN_ID }}/random_forest_model" -n "student-performance-model:latest" --env-manager=local

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Tag Docker image
      run: |
        docker tag student-performance-model:latest ${{ secrets.DOCKER_USERNAME }}/student-performance-model:latest

    - name: Push Docker image to Docker Hub
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/student-performance-model:latest